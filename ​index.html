
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSTM | Güvenli Durum Raporlama Paneli</title>
    <style>
        :root {
            --dark-bg: #0d1117;
            --panel-bg: #161b22;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --text-color: #c9d1d9;
            --border-color: #30363d;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Consolas', monospace;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .report-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h2 {
            color: var(--accent-blue);
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .description {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #f0f6fc;
        }

        textarea {
            width: 100%;
            height: 100px;
            background-color: var(--dark-bg);
            border: 1px solid var(--border-color);
            color: #58a6ff;
            padding: 10px;
            border-radius: 4px;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        textarea:focus {
            border-color: var(--accent-blue);
        }

        .send-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background-color: #2ea44f;
        }

        #status-log {
            margin-top: 15px;
            font-size: 12px;
            color: #8b949e;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="report-card">
    <h2>SİSTEM DURUM RAPORLAYICI (MONITORING)</h2>
    <p class="description">
        Bu panel, altyapı sunucularınızdaki teknik durum raporlarını veya hata loglarını (debug logs) API üzerinden Telegram kanalınıza yasal ve şeffaf bir şekilde iletmek için tasarlanmıştır.
    </p>

    <div class="form-group">
        <label>Gönderilecek Sistem Raporu / Log Mesajı</label>
        <textarea id="logMessage" placeholder="Örn: Sunucu yedeklemesi başarıyla tamamlandı. Bellek kullanımı %45."></textarea>
    </div>

    <button class="send-btn" onclick="sendSystemReport()">Log Raporunu İlet</button>
    
    <div id="status-log"></div>
</div>

<script>
    // Kullanıcının sağladığı resmi API bilgileri (Sadece yasal durum logları için)
    const TG_TOKEN = '8615703049:AAGCPGH59YdLkvCsHdr1WkYuSWGgyuEfBSQ';
    const TG_CHANNEL = '@hukum_pin_bot1';

    async function sendSystemReport() {
        const messageInput = document.getElementById('logMessage');
        const statusDiv = document.getElementById('status-log');
        const userContent = messageInput.value.trim();

        if (!userContent) {
            statusDiv.innerText = "Hata: Boş rapor gönderilemez.";
            statusDiv.style.color = "#ff7b72";
            return;
        }

        statusDiv.innerText = "Rapor API üzerinden gönderiliyor...";
        statusDiv.style.color = "#8b949e";

        // Güvenli ve şeffaf mesaj formatı oluşturma
        const formattedMessage = `📢 **TSTM SİSTEM RAPORU**\n\n` +
                                 `📝 **Mesaj:** ${userContent}\n` +
                                 `⏰ **Zaman:** ${new Date().toLocaleString('tr-TR')}\n` +
                                 `💻 **Durum:** Güvenli Yerel Test`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TG_CHANNEL,
                    text: formattedMessage,
                    parse_mode: 'Markdown'
                })
            });

            if (response.ok) {
                statusDiv.innerText = "✔ Sistem raporu Telegram kanalına başarıyla iletildi.";
                statusDiv.style.color = "#56d364";
                messageInput.value = ""; // Formu temizle
            } else {
                statusDiv.innerText = "API Hatası: Log iletilemedi. Token veya kanal adını kontrol edin.";
                statusDiv.style.color = "#ff7b72";
            }
        } catch (error) {
            statusDiv.innerText = "Bağlantı Hatası: API sunucusuna erişilemedi.";
            statusDiv.style.color = "#ff7b72";
        }
    }
</script>

</body>
</html>
